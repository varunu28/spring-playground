# deployment/echo-service.yml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-service
  namespace: kubeproxy-demo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: echo-service
  template:
    metadata:
      labels:
        app: echo-service
    spec:
      containers:
        - name: echo-service
          image: varunu2892/echo-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: echo-service
  namespace: kubeproxy-demo
spec:
  selector:
    app: echo-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
